x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  api:
    container_name: siemensbot_api
    build: .
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${API_HOST_PORT:-8001}:8000"
    volumes:
      - ./runtime:/app/runtime:ro
    logging: *default-logging
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8000;
          printf "GET /health/ready HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n" >&3;
          IFS= read -r status <&3;
          [[ "$$status" == *" 200 "* ]]'
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  admin_bot:
    container_name: siemensbot_admin_bot
    build: .
    env_file: .env
    command: python -m app.bots.admin_bot
    volumes:
      - ./runtime:/app/runtime
    logging: *default-logging
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -ec 'tr "\0" " " < /proc/1/cmdline | grep -Fq "python -m app.bots.admin_bot";
          exec 3<>/dev/tcp/api/8000;
          printf "GET /health/ready HTTP/1.1\r\nHost: api\r\nConnection: close\r\n\r\n" >&3;
          IFS= read -r status <&3;
          [[ "$$status" == *" 200 "* ]]'
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 30s

  user_bot:
    container_name: siemensbot_user_bot
    build: .
    env_file: .env
    command: python -m app.bots.user_bot
    volumes:
      - ./runtime:/app/runtime:ro
    logging: *default-logging
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -ec 'tr "\0" " " < /proc/1/cmdline | grep -Fq "python -m app.bots.user_bot";
          exec 3<>/dev/tcp/api/8000;
          printf "GET /health/ready HTTP/1.1\r\nHost: api\r\nConnection: close\r\n\r\n" >&3;
          IFS= read -r status <&3;
          [[ "$$status" == *" 200 "* ]]'
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 30s

  ping_worker:
    container_name: siemensbot_ping_worker
    build: .
    env_file: .env
    command: python -m app.workers.ping_worker
    volumes:
      - ./runtime:/app/runtime:ro
    logging: *default-logging
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -ec 'tr "\0" " " < /proc/1/cmdline | grep -Fq "python -m app.workers.ping_worker";
          exec 3<>/dev/tcp/api/8000;
          printf "GET /health/ready HTTP/1.1\r\nHost: api\r\nConnection: close\r\n\r\n" >&3;
          IFS= read -r status <&3;
          [[ "$$status" == *" 200 "* ]]'
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 30s

  google_sheets_worker:
    container_name: siemensbot_google_sheets_worker
    build: .
    env_file: .env
    command: python -m app.workers.google_sheets_worker
    volumes:
      - ./runtime:/app/runtime:ro
      - ./secrets:/app/secrets:ro
    logging: *default-logging
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -ec 'tr "\0" " " < /proc/1/cmdline | grep -Fq "python -m app.workers.google_sheets_worker";
          exec 3<>/dev/tcp/api/8000;
          printf "GET /health/ready HTTP/1.1\r\nHost: api\r\nConnection: close\r\n\r\n" >&3;
          IFS= read -r status <&3;
          [[ "$$status" == *" 200 "* ]]'
      interval: 60s
      timeout: 3s
      retries: 3
      start_period: 30s
